<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Step Form with Progress Bar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .progress {
      height: 10px;
      background-color: #e9ecef;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-bar {
      background-color: #3ec182;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body class="p-4">

<div class="container">
  <h4 class="mb-3">Multi-Step Form with Progress Bar</h4>

  <!-- Progress Bar -->
  <div class="mb-4">
    <div class="progress">
      <div class="progress-bar" role="progressbar" style="width: 25%;" id="progressBar"></div>
    </div>
  </div>

  <form id="wizardForm">

    <!-- Step 1: Contact Info -->
    <div class="step active">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" required>
      </div>
    </div>

    <!-- Step 2: Address Info -->
    <div class="step">
      <div class="mb-3">
        <label class="form-label">Street</label>
        <input type="text" name="street" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">City</label>
        <input type="text" name="city" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Zip Code</label>
        <input type="text" name="zip" class="form-control" required>
      </div>
    </div>

    <!-- Step 3: Description -->
    <div class="step">
      <div class="mb-3">
        <label class="form-label">Description (Optional)</label>
        <textarea name="description" class="form-control" placeholder="You can leave this blank"></textarea>
      </div>
    </div>

    <!-- Step 4: Review -->
    <div class="step">
      <h5>Review Your Details</h5>
      <ul class="list-group">
        <li class="list-group-item"><strong>Name:</strong> <span id="r_name"></span></li>
        <li class="list-group-item"><strong>Email:</strong> <span id="r_email"></span></li>
        <li class="list-group-item"><strong>Phone:</strong> <span id="r_phone"></span></li>
        <li class="list-group-item"><strong>Street:</strong> <span id="r_street"></span></li>
        <li class="list-group-item"><strong>City:</strong> <span id="r_city"></span></li>
        <li class="list-group-item"><strong>Zip:</strong> <span id="r_zip"></span></li>
        <li class="list-group-item"><strong>Description:</strong> <span id="r_description"></span></li>
      </ul>
    </div>

    <!-- Navigation Buttons -->
    <div class="d-flex justify-content-between mt-4">
      <button type="button" class="btn btn-secondary" id="prevBtn">Previous</button>
      <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
    </div>

  </form>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  let currentStep = 0;
  const totalSteps = $('.step').length;

  function showStep(index) {
    $('.step').removeClass('active').eq(index).addClass('active');

    // Update buttons
    $('#prevBtn').toggle(index > 0);
    $('#nextBtn').text(index === totalSteps - 1 ? 'Submit' : 'Next');

    // Update progress bar
    const progress = ((index + 1) / totalSteps) * 100;
    $('#progressBar').css('width', `${progress}%`);
  }

  function validateStep() {
    const currentFields = $('.step').eq(currentStep).find(':input[required]');
    let isValid = true;

    currentFields.each(function () {
      const $field = $(this);
      const val = $field.val().trim();
      $field.removeClass('is-invalid');
      $field.next('.invalid-feedback').remove();

      if (!val) {
        isValid = false;
        $field.addClass('is-invalid');
        $field.after('<div class="invalid-feedback">This field is required.</div>');
      }
    });

    return isValid;
  }

  function fillReview() {
    const data = $('#wizardForm').serializeArray();
    const map = {};
    data.forEach(item => map[item.name] = item.value);

    $('#r_name').text(map.name || '');
    $('#r_email').text(map.email || '');
    $('#r_phone').text(map.phone || '');
    $('#r_street').text(map.street || '');
    $('#r_city').text(map.city || '');
    $('#r_zip').text(map.zip || '');
    $('#r_description').text(map.description || '—');
  }

  $('#nextBtn').on('click', function () {
    if (currentStep < totalSteps - 1) {
      if (validateStep()) {
        currentStep++;
        if (currentStep === totalSteps - 1) fillReview();
        showStep(currentStep);
      }
    } else {
      if (validateStep()) {
        alert("Form submitted successfully!");
        $('#wizardForm')[0].reset();
        currentStep = 0;
        showStep(currentStep);
      }
    }
  });

  $('#prevBtn').on('click', function () {
    if (currentStep > 0) {
      currentStep--;
      showStep(currentStep);
    }
  });

  // Initialize
  showStep(currentStep);
</script>

</body>
</html>
